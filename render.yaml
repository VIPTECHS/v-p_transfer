services:
  # API + database (bookings, admin, enquiries)
  - type: web
    name: vip-transfer-api
    runtime: node
    plan: free
    healthCheckPath: /health
    buildCommand: npm install
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: CORS_ORIGIN
        value: https://viptransfer.com
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
    disk:
      name: vip-transfer-db
      mountPath: /opt/render/project/src/server/prisma
      sizeGB: 1

  # Frontend (static) — must point to API at build time
  - type: web
    name: vip-transfer-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BOOKING_API_URL
        fromService:
          type: web
          name: vip-transfer-api
          envVarKey: RENDER_EXTERNAL_URL

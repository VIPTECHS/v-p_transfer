name: Deploy VIP Transfer to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hetzner_key -p ${{ secrets.SERVER_PORT }}" \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".env" \
            --exclude "server/prisma/dev.db" \
            --exclude "server/prisma/dev.db-journal" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.PROJECT_PATH }}/

      - name: Build and restart Docker containers
        run: |
          ssh -i ~/.ssh/hetzner_key \
            -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ secrets.PROJECT_PATH }} && docker compose up -d --build && docker image prune -f"
